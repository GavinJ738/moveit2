context:
  name: "ros-jazzy-moveit2"
  version: "2.14.0" # Update to match your specific branch/tag

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  path: .

build:
  number: 0
  script: |
    # Build everything in the repo, skipping the tests to save time
    colcon build \
      --merge-install \
      --install-base $PREFIX \
      --cmake-args -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
    
    rm -rf build log

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - cmake
    - make
    - ninja
    - pkg-config
    - colcon-common-extensions
    - ros-jazzy-ament-cmake
    - ros-jazzy-ament-cmake-ros
    - ros-jazzy-eigen3-cmake-module
  host:
    - ros-jazzy-tf2-eigen-kdl
    # --- System Dependencies ---
    - assimp
    - bullet
    - eigen
    - fcl
    - fmt
    - freeglut
    - glew
    - ros-jazzy-osqp-vendor
    - pybind11
    - python
    - qt-main
    - urdfdom
    - urdfdom_headers

    # --- External ROS 2 Jazzy Dependencies ---
    - ros-jazzy-angles
    - ros-jazzy-class-loader
